<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:fragment="layout(content)">
<head>
    <meta charset="UTF-8">
    <title th:text="${pageTitle}">VBook Airlines</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
</head>
<style>
    .navbar {
        background: linear-gradient(135deg, #1e3c72, #2a5298);
    }

    .nav-link i {
        margin-right: 5px;
    }

    .nav-link:hover {
        color: #ffd700 !important;
    }
</style>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-primary fixed-top shadow">
    <div class="container-fluid">

        <!-- Logo -->
        <a class="navbar-brand fw-bold" th:href="@{/dashboard}">
            <i class="bi bi-airplane-engines-fill"></i> VBook Airlines
        </a>

        <!-- Toggle -->
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>

        <!-- Links -->
        <div class="collapse navbar-collapse" id="navbarNav">

            <!-- Left -->
            <ul class="navbar-nav me-auto">

                <li class="nav-item">
                    <a class="nav-link" th:href="@{/dashboard}">
                        <i class="bi bi-house-door-fill"></i> Home
                    </a>
                </li>

                <li class="nav-item dropdown">
                    <a class="nav-link dropdown-toggle" href="#" id="searchDropdown"
                       role="button" data-bs-toggle="dropdown">
                        <i class="bi bi-search"></i> Search
                    </a>

                    <div class="dropdown-menu p-4 shadow" style="min-width: 300px;">

                        <form th:action="@{/api/search}" method="get">

                            <!-- Source -->
                            <div class="mb-2 position-relative">
                                <input type="text" id="sourceInput"
                                       name="source"
                                       class="form-control"
                                       placeholder="From (e.g. Bangalore)" required>
                                <div id="sourceSuggestions"
                                     class="list-group position-absolute w-100"></div>
                            </div>

                            <!-- Destination -->
                            <div class="mb-2 position-relative">
                                <input type="text" id="destinationInput"
                                       name="destination"
                                       class="form-control"
                                       placeholder="To (e.g. Delhi)" required>
                                <div id="destinationSuggestions"
                                     class="list-group position-absolute w-100"></div>
                            </div>

                            <button class="btn btn-primary w-100">
                                <i class="bi bi-airplane"></i> Search Flights
                            </button>

                        </form>

                    </div>
                </li>

                <li class="nav-item">
                    <a class="nav-link" th:href="@{/my-bookings}">
                        <i class="bi bi-ticket-perforated-fill"></i> My Bookings
                    </a>
                </li>

            </ul>

            <!-- Right -->
            <ul class="navbar-nav">

                <!-- Logged in -->
                <li class="nav-item" th:if="${#authentication != null}">
                    <span class="nav-link">
                        <i class="bi bi-person-circle"></i>
                        <span th:text="${#authentication.name}"></span>
                    </span>
                </li>

                <li class="nav-item" th:if="${#authentication != null}">
                    <a class="nav-link text-warning" th:href="@{/logout}">
                        <i class="bi bi-box-arrow-right"></i> Logout
                    </a>
                </li>

                <!-- Not logged in -->
                <li class="nav-item" th:if="${#authentication == null}">
                    <a class="nav-link" th:href="@{/login}">
                        <i class="bi bi-box-arrow-in-right"></i> Login
                    </a>
                </li>

            </ul>

        </div>
    </div>
</nav>
<div class="container mt-5 pt-4">

    <!-- PAGE CONTENT WILL BE INSERTED HERE -->
    <div th:replace="${content}"></div>

</div>

<!-- FOOTER -->
<footer class="bg-dark text-white text-center p-3 mt-5">
    © 2026 VBook Airlines
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
<script>
    async function fetchSuggestions(type, value) {

        if (value.length < 2) return;

        const response = await fetch(`/api/suggest/${type}?query=` + value);
        const data = await response.json();

        let box = document.getElementById(type + "Suggestions");
        box.innerHTML = "";

        data.forEach(item => {
            let option = document.createElement("a");
            option.classList.add("list-group-item", "list-group-item-action");
            option.innerText = item;

            option.onclick = () => {
                document.getElementById(type + "Input").value = item;
                box.innerHTML = "";
            };

            box.appendChild(option);
        });
    }

    document.getElementById("sourceInput")
        .addEventListener("keyup", e => fetchSuggestions("source", e.target.value));

    document.getElementById("destinationInput")
        .addEventListener("keyup", e => fetchSuggestions("destination", e.target.value));
</script>
</html>
