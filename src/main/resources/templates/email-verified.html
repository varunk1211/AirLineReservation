<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Email Verification</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow p-4">
                <div class="card-body text-center">
                    <div th:if="${message}">
                        <h2 class="text-success mb-3">✓ Email Verified!</h2>
                        <p class="lead" th:text="${message}"></p>
                        <a th:href="@{/login}" class="btn btn-primary mt-3">Go to Login</a>
                    </div>
                    <div th:if="${error}">
                        <h2 class="text-danger mb-3">✗ Verification Failed</h2>
                        <p class="lead" th:text="${error}"></p>
                        <a th:href="@{/register}" class="btn btn-primary mt-3">Register Again</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
