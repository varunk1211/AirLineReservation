<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout :: layout(~{::section})}">

<section class="container mt-5">

    <h2>My Bookings</h2>

    <div th:if="${#lists.isEmpty(bookings)}">
        <p>You have no bookings yet.</p>
    </div>

    <div th:if="${!#lists.isEmpty(bookings)}">
        <div class="row">
            <div th:each="booking : ${bookings}" class="col-md-12 mb-4">
                <div class="card">
                    <div class="card-header">
                        <h5>Booking Reference: <span th:text="${booking.bookingReference}"></span></h5>
                        <p class="mb-0">Status: <span th:text="${booking.bookingStatus}"></span></p>
                    </div>
                    <div class="card-body">
                        <div class="row">
                            <div class="col-md-6">
                                <h6>Flight Details</h6>
                                <p><strong>Flight Number:</strong> <span th:text="${booking.flight.flightNumber}"></span></p>
                                <p><strong>Airline:</strong> <span th:text="${booking.flight.airlineName}"></span></p>
                                <p><strong>From:</strong> <span th:text="${booking.flight.source}"></span></p>
                                <p><strong>To:</strong> <span th:text="${booking.flight.destination}"></span></p>
                                <p><strong>Departure:</strong> <span th:text="${#temporals.format(booking.flight.departureTime, 'dd/MM/yyyy HH:mm')}"></span></p>
                                <p><strong>Arrival:</strong> <span th:text="${#temporals.format(booking.flight.arrivalTime, 'dd/MM/yyyy HH:mm')}"></span></p>
                            </div>
                            <div class="col-md-6">
                                <h6>Booking Details</h6>
                                <p><strong>Booking Date:</strong> <span th:text="${#temporals.format(booking.bookingDate, 'dd/MM/yyyy HH:mm')}"></span></p>
                                <p><strong>Total Amount:</strong> $<span th:text="${booking.totalAmount}"></span></p>
                                <h6>Passengers</h6>
                                <ul>
                                    <li th:each="passenger : ${booking.passengers}" th:text="${passenger.fullName}"></li>
                                </ul>
                                <a th:href="@{/download-ticket/{id}(id=${booking.id})}" class="btn btn-primary btn-sm">
                                    Download Ticket
                                </a>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

</section>

</html>
