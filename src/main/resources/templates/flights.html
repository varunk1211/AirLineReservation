<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout :: layout(~{::section})}">

<section>
    <div class="container mt-4">

        <h2 class="mb-4 text-center">Available Flights</h2>

        <table class="table table-striped table-bordered">
            <thead class="table-dark">
            <tr>
                <th>ID</th>
                <th>Flight Number</th>
                <th>Airline</th>
                <th>Source</th>
                <th>Destination</th>
                <th>Departure</th>
                <th>Arrival</th>
                <th>Price</th>
                <th>Seats Available</th>
                <th>Action</th>
            </tr>
            </thead>

            <tbody>
            <tr th:each="flight : ${flights}">

                <td th:text="${flight.id}"></td>
                <td th:text="${flight.flightNumber}"></td>
                <td th:text="${flight.airlineName}"></td>
                <td th:text="${flight.source}"></td>
                <td th:text="${flight.destination}"></td>
                <td th:text="${#temporals.format(flight.departureTime,'dd MMM yyyy HH:mm')}"></td>
                <td th:text="${#temporals.format(flight.arrivalTime,'dd MMM yyyy HH:mm')}"></td>
                <td>₹<span th:text="${flight.price}"></span></td>
                <td th:text="${flight.availableSeats}"></td>

                <td>

                    <!-- Disable button if seats = 0 -->
                    <a th:if="${flight.availableSeats > 0}"
                       th:href="@{/book/{id}(id=${flight.id})}"
                       class="btn btn-primary btn-sm">
                        Book
                    </a>

                    <span th:if="${flight.availableSeats == 0}"
                          class="badge bg-danger">
                    Sold Out
                </span>

                </td>

            </tr>
            </tbody>

        </table>

    </div>
</section>
</html>
