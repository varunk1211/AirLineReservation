<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Registration Successful</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow p-4">
                <div class="card-body text-center">
                    <h2 class="text-success mb-3">✓ Registration Successful!</h2>
                    <p class="lead">A verification email has been sent to your email address.</p>
                    <p>Please check your inbox and click the verification link to activate your account.</p>
                    <p class="text-muted">The link will expire in 24 hours.</p>
                    <hr>
                    <p class="small">Once verified, you can login to your account.</p>
                    <a th:href="@{/login}" class="btn btn-primary">Go to Login</a>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
