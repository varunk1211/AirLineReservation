<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout :: layout(~{::section})}">

<section class="container mt-5">
    <h2 class="mb-4 text-center">Edit Destination</h2>

    <form th:action="@{/admin/destinations/edit/{id}(id=${destination.id})}" th:object="${destination}" method="post">

        <div class="mb-3">
            <label class="form-label">Destination Name</label>
            <input type="text" class="form-control" th:field="*{name}" placeholder="Enter destination name" required>
        </div>

        <div class="mb-3">
            <label class="form-label">Description</label>
            <textarea class="form-control" th:field="*{description}" rows="4" placeholder="Enter description" required></textarea>
        </div>

        <div class="mb-3">
            <label class="form-label">Image URL</label>
            <input type="url" class="form-control" th:field="*{imageUrl}" placeholder="Enter image URL" required>
        </div>

        <div class="d-flex justify-content-between">
            <button type="submit" class="btn btn-primary">Update Destination</button>
            <a th:href="@{/admin/destinations}" class="btn btn-secondary">Cancel</a>
        </div>

    </form>
</section>

</html>
